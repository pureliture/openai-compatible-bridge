# OpenAI-compatible client와 같은 private network에 붙여서 container DNS로 통신하게 한다.
services:
  openai-compatible-bridge:
    build: .
    container_name: openai-compatible-bridge
    restart: unless-stopped
    ports:
      # 컨테이너는 80으로 listen -> 같은 Docker network의 client는 http://openai-compatible-bridge 로 접근.
      # 호스트(맥미니 등 도커망 밖)에서 디버깅하려면 8930으로 공개. 불필요하면 이 줄 삭제 가능.
      - "8930:80"
    environment:
      VERTEX_PROJECT: ${VERTEX_PROJECT}
      VERTEX_LOCATION: ${VERTEX_LOCATION:-us-central1}
      VERTEX_TASK_TYPE_DEFAULT: ${VERTEX_TASK_TYPE_DEFAULT:-RETRIEVAL_DOCUMENT}
      VERTEX_AUTO_TRUNCATE: ${VERTEX_AUTO_TRUNCATE:-true}
      BRIDGE_API_KEY: ${BRIDGE_API_KEY:-}
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/vertex-sa.json
      MAX_CONCURRENCY: ${MAX_CONCURRENCY:-8}
      EXTRA_MODELS: ${EXTRA_MODELS:-}
      DEFAULT_MAX_INSTANCES: ${DEFAULT_MAX_INSTANCES:-1}
      COST_TRACKING_ENABLED: ${COST_TRACKING_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      COST_LEDGER_PATH: ${COST_LEDGER_PATH:-/data/cost-ledger.db}
      COST_PRICING_JSON: ${COST_PRICING_JSON:-}
      COST_PRICING_PATH: ${COST_PRICING_PATH:-}
      COST_SHORT_WINDOW_SECONDS: ${COST_SHORT_WINDOW_SECONDS:-}
      COST_SHORT_WINDOW_LIMIT_USD: ${COST_SHORT_WINDOW_LIMIT_USD:-}
      COST_DAILY_LIMIT_USD: ${COST_DAILY_LIMIT_USD:-}
      COST_ADMIN_ENABLED: ${COST_ADMIN_ENABLED:-false}
      COST_ADMIN_API_KEY: ${COST_ADMIN_API_KEY:-}
      COST_RECONCILIATION_ENABLED: ${COST_RECONCILIATION_ENABLED:-false}
      COST_BILLING_BIGQUERY_PROJECT: ${COST_BILLING_BIGQUERY_PROJECT:-}
      COST_BILLING_BIGQUERY_DATASET: ${COST_BILLING_BIGQUERY_DATASET:-}
      COST_BILLING_BIGQUERY_TABLE: ${COST_BILLING_BIGQUERY_TABLE:-}
      COST_RETENTION_REQUEST_DAYS: ${COST_RETENTION_REQUEST_DAYS:-90}
      COST_RETENTION_AGGREGATE_MONTHS: ${COST_RETENTION_AGGREGATE_MONTHS:-13}
    volumes:
      - ${VERTEX_SA_KEY_PATH:-./secrets/vertex-sa.json}:/app/secrets/vertex-sa.json:ro
      - ${COST_LEDGER_DIR:-./data}:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:80/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ragflow

networks:
  ragflow:
    external: true
    # 연결할 실제 Docker network 이름으로 바꿀 것: `docker network ls`로 확인.
    name: ${RAGFLOW_NETWORK:-ragflow_default}
